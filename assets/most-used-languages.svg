<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 210" width="760" height="210">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#090611"/>
      <stop offset="50%"  stop-color="#0f0920"/>
      <stop offset="100%" stop-color="#130b26"/>
    </linearGradient>
    <filter id="nebula" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="22" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dot-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="title-glow" x="-10%" y="-40%" width="120%" height="180%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bar-shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <style>
    .lang-name {
      fill: #e0daf0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 11.5px;
      font-weight: 500;
    }
    .lang-pct {
      fill: #a898c8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 10.5px;
      font-weight: 700;
      text-anchor: end;
    }
    .section-title {
      fill: #ffb7d5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 13.5px;
      font-weight: 700;
      letter-spacing: 1.4px;
    }
    .sub-label {
      fill: #7a6e99;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.5px;
    }
    @keyframes float-p {
      from { transform: translateY(0px);  opacity: 0.3; }
      to   { transform: translateY(-5px); opacity: 0.7; }
    }
  </style>

  <!-- Background -->
  <rect width="760" height="210" rx="14" fill="url(#bg)"/>
  <rect x="0.75" y="0.75" width="758.5" height="208.5" rx="13.25" fill="none" stroke="#ff80bf" stroke-width="1" stroke-opacity="0.28"/>

  <!-- Nebula clouds -->
  <circle cx="90"  cy="50"  r="70"  fill="#ff4d94" opacity="0.07" filter="url(#nebula)"/>
  <circle cx="670" cy="160" r="80" fill="#8a2be2" opacity="0.09" filter="url(#nebula)"/>
  <circle cx="380" cy="105" r="50" fill="#c060d0" opacity="0.04" filter="url(#nebula)"/>

  <!-- Constellation lines -->
  
  <line x1="22" y1="28"  x2="380" y2="18"  stroke="#ff63b1" stroke-width="0.4" stroke-opacity="0.12"/>
  <line x1="380" y1="18" x2="740" y2="25"  stroke="#c060d0" stroke-width="0.4" stroke-opacity="0.12"/>
  <line x1="16"  y1="190" x2="175" y2="185" stroke="#ff80bf" stroke-width="0.4" stroke-opacity="0.12"/>
  <line x1="175" y1="185" x2="585" y2="185" stroke="#8a2be2" stroke-width="0.4" stroke-opacity="0.12"/>
  <line x1="585" y1="185" x2="738" y2="185" stroke="#c060d0" stroke-width="0.4" stroke-opacity="0.12"/>

  <!-- Stars & sparkles -->
  <path d="M 22 23 Q 22 28 27 28 Q 22 28 22 33 Q 22 28 17 28 Q 22 28 22 23 Z" fill="#ffb7d5" opacity="0.6"/>
  <path d="M 740 21 Q 740 25 744 25 Q 740 25 740 29 Q 740 25 736 25 Q 740 25 740 21 Z" fill="#ffb7d5" opacity="0.6"/>
  <path d="M 738 180 Q 738 185 743 185 Q 738 185 738 190 Q 738 185 733 185 Q 738 185 738 180 Z" fill="#ffb7d5" opacity="0.6"/>
  <path d="M 16 186 Q 16 190 20 190 Q 16 190 16 194 Q 16 190 12 190 Q 16 190 16 186 Z" fill="#ffb7d5" opacity="0.6"/>
  <path d="M 380 14 Q 380 18 384 18 Q 380 18 380 22 Q 380 18 376 18 Q 380 18 380 14 Z" fill="#ffb7d5" opacity="0.6"/>
  <path d="M 585 182 Q 585 185 588 185 Q 585 185 585 188 Q 585 185 582 185 Q 585 185 585 182 Z" fill="#ffb7d5" opacity="0.6"/>
  <path d="M 175 182 Q 175 185 178 185 Q 175 185 175 188 Q 175 185 172 185 Q 175 185 175 182 Z" fill="#ffb7d5" opacity="0.6"/>
  <circle cx="700" cy="55" r="1.5" fill="#ffb7d5" opacity="0.5"/>
  <circle cx="55" cy="155" r="1.5" fill="#c060d0" opacity="0.5"/>
  <circle cx="310" cy="195" r="1.2" fill="#ff80bf" opacity="0.4"/>
  <circle cx="450" cy="22" r="1.2" fill="#8a2be2" opacity="0.45"/>

  <!-- Floating particles -->
  <circle cx="60" cy="68" r="1" fill="#ff63b1" opacity="0.35" style="animation: float-p 4.1s ease-in-out 1.2s infinite alternate;"/>
  <circle cx="200" cy="82" r="0.9" fill="#c060d0" opacity="0.3" style="animation: float-p 5.2s ease-in-out 2.8s infinite alternate;"/>
  <circle cx="430" cy="72" r="1.1" fill="#ffb7d5" opacity="0.4" style="animation: float-p 3.8s ease-in-out 0.5s infinite alternate;"/>
  <circle cx="600" cy="65" r="0.8" fill="#8a2be2" opacity="0.3" style="animation: float-p 6s ease-in-out 3.5s infinite alternate;"/>
  <circle cx="710" cy="78" r="1" fill="#ff80bf" opacity="0.35" style="animation: float-p 4.5s ease-in-out 1.8s infinite alternate;"/>
  <circle cx="130" cy="170" r="0.8" fill="#c060d0" opacity="0.25" style="animation: float-p 5.5s ease-in-out 2s infinite alternate;"/>
  <circle cx="520" cy="172" r="1" fill="#ff63b1" opacity="0.3" style="animation: float-p 4s ease-in-out 0.8s infinite alternate;"/>

  <!-- Title -->
  <text x="48" y="42" class="section-title" filter="url(#title-glow)">🌸  MOST USED LANGUAGES</text>
  <text x="48" y="58" class="sub-label">Technology distribution across all repositories</text>

  <!-- Bar track -->
  <rect x="48" y="90" width="664" height="14" rx="7" fill="#1c1530"/>
  <!-- Bar segments -->
  <rect x="48.00" y="90" width="268.92" height="14" rx="7" ry="7" fill="#ff63b1"/>
<rect x="309.92" y="90" width="7" height="14" fill="#ff63b1"/>
<rect x="316.92" y="90" width="217.79" height="14" fill="#c060d0"/>
<rect x="534.71" y="90" width="100.93" height="14" fill="#ff80bf"/>
<rect x="635.64" y="90" width="76.36" height="14" rx="7" ry="7" fill="#8a2be2"/>
<rect x="635.64" y="90" width="7" height="14" fill="#8a2be2"/>

  <!-- Bar shine overlay -->
  <rect x="48" y="90" width="664" height="7" rx="7" fill="url(#bar-shine)"/>

  <!-- Language badges -->
  
    <g class="lang-group">
      <!-- pill badge -->
      <rect x="48" y="125" width="154" height="22" rx="11" fill="#3d1b54" stroke="#ff63b1" stroke-width="1" stroke-opacity="0.5"/>
      <!-- dot -->
      <circle cx="60" cy="136" r="4" fill="#ff63b1" filter="url(#dot-glow)"/>
      <!-- name -->
      <text x="70" y="140" class="lang-name">Dart & Flutter</text>
      <!-- percentage label -->
      <text x="194" y="140" class="lang-pct">40.5%</text>
    </g><line x1="125" y1="105" x2="125" y2="125" stroke="#ff63b1" stroke-width="0.7" stroke-opacity="0.22" stroke-dasharray="2 3"/>
    <g class="lang-group">
      <!-- pill badge -->
      <rect x="214" y="125" width="154" height="22" rx="11" fill="#2a1044" stroke="#c060d0" stroke-width="1" stroke-opacity="0.5"/>
      <!-- dot -->
      <circle cx="226" cy="136" r="4" fill="#c060d0" filter="url(#dot-glow)"/>
      <!-- name -->
      <text x="236" y="140" class="lang-name">JavaScript</text>
      <!-- percentage label -->
      <text x="360" y="140" class="lang-pct">32.8%</text>
    </g><line x1="291" y1="105" x2="291" y2="125" stroke="#c060d0" stroke-width="0.7" stroke-opacity="0.22" stroke-dasharray="2 3"/>
    <g class="lang-group">
      <!-- pill badge -->
      <rect x="380" y="125" width="154" height="22" rx="11" fill="#1a0c30" stroke="#ff80bf" stroke-width="1" stroke-opacity="0.5"/>
      <!-- dot -->
      <circle cx="392" cy="136" r="4" fill="#ff80bf" filter="url(#dot-glow)"/>
      <!-- name -->
      <text x="402" y="140" class="lang-name">C++</text>
      <!-- percentage label -->
      <text x="526" y="140" class="lang-pct">15.2%</text>
    </g><line x1="457" y1="105" x2="457" y2="125" stroke="#ff80bf" stroke-width="0.7" stroke-opacity="0.22" stroke-dasharray="2 3"/>
    <g class="lang-group">
      <!-- pill badge -->
      <rect x="546" y="125" width="154" height="22" rx="11" fill="#150a28" stroke="#8a2be2" stroke-width="1" stroke-opacity="0.5"/>
      <!-- dot -->
      <circle cx="558" cy="136" r="4" fill="#8a2be2" filter="url(#dot-glow)"/>
      <!-- name -->
      <text x="568" y="140" class="lang-name">Python</text>
      <!-- percentage label -->
      <text x="692" y="140" class="lang-pct">11.5%</text>
    </g><line x1="623" y1="105" x2="623" y2="125" stroke="#8a2be2" stroke-width="0.7" stroke-opacity="0.22" stroke-dasharray="2 3"/>

  <!-- Total label -->
  <text x="712" y="84" class="sub-label" text-anchor="end">100% of activity</text>
</svg>