<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 120" width="760" height="120">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0712" />
      <stop offset="100%" stop-color="#120c22" />
    </linearGradient>
    <filter id="bg-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    .card-title {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .card-sub {
      fill: #c8bedd;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 10.5px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }
  </style>

  <!-- Background -->
  <rect width="760" height="120" rx="14" fill="url(#bg-grad)" />
  <!-- Subtle bg nebula glows -->
  <circle cx="120" cy="60" r="55" fill="#ff63b1" opacity="0.06" filter="url(#bg-glow)" />
  <circle cx="640" cy="60" r="55" fill="#8a2be2" opacity="0.06" filter="url(#bg-glow)" />

  
  <!-- Card 1: India Innovates -->
  <defs>
    <linearGradient id="cg0" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff63b1" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#0d0a1a" stop-opacity="0.92" />
    </linearGradient>
    <filter id="cf0" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Card glow halo -->
  <rect x="23" y="18" width="224" height="84" rx="14" fill="#ff4d94" opacity="0.12" filter="url(#cf0)" />
  <!-- Card body -->
  <rect x="25" y="20" width="220" height="80" rx="12" fill="url(#cg0)" />
  <!-- Card border -->
  <rect x="25.75" y="20.75" width="218.5" height="78.5" rx="11.25" fill="none" stroke="#ff63b1" stroke-width="1" stroke-opacity="0.45" />
  <!-- Top accent line -->
  <rect x="55" y="20" width="160" height="2" rx="1" fill="#ff63b1" opacity="0.6" />
  <!-- Icon -->
  <text x="45" y="54" font-size="22" dominant-baseline="middle">🏆</text>
  <!-- Title -->
  <text x="75" y="47" class="card-title" fill="#ff63b1">India Innovates</text>
  <!-- Subtitle -->
  <text x="75" y="66" class="card-sub">Finalist</text>
  <!-- Sparkle 1 -->
  <path d="M 231 24 Q 231 28 235 28 Q 231 28 231 32 Q 231 28 227 28 Q 231 28 231 24 Z" fill="#ff63b1" opacity="0.55" />
  <!-- Sparkle 2 -->
  <path d="M 35 87 Q 35 90 38 90 Q 35 90 35 93 Q 35 90 32 90 Q 35 90 35 87 Z" fill="#ff63b1" opacity="0.4" />

  <!-- Card 2: BuildWithDelhi 2.0 -->
  <defs>
    <linearGradient id="cg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a84cb0" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#0d0a1a" stop-opacity="0.92" />
    </linearGradient>
    <filter id="cf1" x="-15%" y="-15%" width="130%" height="130%">
