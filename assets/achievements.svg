  <!-- Card body -->
  <rect x="270" y="20" width="220" height="80" rx="12" fill="url(#cg1)" />
  <!-- Card border -->
  <rect x="270.75" y="20.75" width="218.5" height="78.5" rx="11.25" fill="none" stroke="#a84cb0" stroke-width="1" stroke-opacity="0.45" />
  <!-- Top accent line -->
  <rect x="300" y="20" width="160" height="2" rx="1" fill="#a84cb0" opacity="0.6" />
  <!-- Icon -->
  <text x="290" y="54" font-size="22" dominant-baseline="middle">🚀</text>
  <!-- Title -->
  <text x="320" y="47" class="card-title" fill="#a84cb0">BuildWithDelhi 2.0</text>
  <!-- Subtitle -->
  <text x="320" y="66" class="card-sub">Top 40 Finalist</text>
  <!-- Sparkle 1 -->
  <path d="M 476 24 Q 476 28 480 28 Q 476 28 476 32 Q 476 28 472 28 Q 476 28 476 24 Z" fill="#a84cb0" opacity="0.55" />
  <!-- Sparkle 2 -->
  <path d="M 280 87 Q 280 90 283 90 Q 280 90 280 93 Q 280 90 277 90 Q 280 90 280 87 Z" fill="#a84cb0" opacity="0.4" />

  <!-- Card 3: BharatTechXperience 3.0 -->
  <defs>
    <linearGradient id="cg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8a2be2" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#0d0a1a" stop-opacity="0.92" />
    </linearGradient>
    <filter id="cf2" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Card glow halo -->
  <rect x="513" y="18" width="224" height="84" rx="14" fill="#aa4aff" opacity="0.12" filter="url(#cf2)" />
  <!-- Card body -->
  <rect x="515" y="20" width="220" height="80" rx="12" fill="url(#cg2)" />
  <!-- Card border -->
  <rect x="515.75" y="20.75" width="218.5" height="78.5" rx="11.25" fill="none" stroke="#8a2be2" stroke-width="1" stroke-opacity="0.45" />
  <!-- Top accent line -->
  <rect x="545" y="20" width="160" height="2" rx="1" fill="#8a2be2" opacity="0.6" />
  <!-- Icon -->
  <text x="535" y="54" font-size="22" dominant-baseline="middle">💡</text>
  <!-- Title -->
  <text x="565" y="47" class="card-title" fill="#8a2be2">BharatTechXperience 3.0</text>
  <!-- Subtitle -->
  <text x="565" y="66" class="card-sub">Best Code Clarity Award</text>
  <!-- Sparkle 1 -->
  <path d="M 721 24 Q 721 28 725 28 Q 721 28 721 32 Q 721 28 717 28 Q 721 28 721 24 Z" fill="#8a2be2" opacity="0.55" />
  <!-- Sparkle 2 -->
  <path d="M 525 87 Q 525 90 528 90 Q 525 90 525 93 Q 525 90 522 90 Q 525 90 525 87 Z" fill="#8a2be2" opacity="0.4" />

</svg>
