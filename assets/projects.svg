<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 530" width="760" height="530">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#090611"/>
      <stop offset="50%" stop-color="#0f0920"/>
      <stop offset="100%" stop-color="#130b26"/>
    </linearGradient>
    <filter id="nebula" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="24" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="card-glow" x="-10%" y="-40%" width="120%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dot-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="title-glow" x="-10%" y="-40%" width="120%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    
    <linearGradient id="cg-0" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff63b1" stop-opacity="0.14" />
      <stop offset="100%" stop-color="#0e0a1b" stop-opacity="0.92" />
    </linearGradient>

    <linearGradient id="cg-1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c060d0" stop-opacity="0.14" />
      <stop offset="100%" stop-color="#0e0a1b" stop-opacity="0.92" />
    </linearGradient>

    <linearGradient id="cg-2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8a2be2" stop-opacity="0.14" />
      <stop offset="100%" stop-color="#0e0a1b" stop-opacity="0.92" />
    </linearGradient>
  </defs>

  <style>
    .section-title {
      fill: #ffb7d5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 13.5px;
      font-weight: 700;
      letter-spacing: 1.4px;
    }
    .sub-label {
      fill: #7a6e99;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.5px;
    }
    .project-title {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 14.5px;
      font-weight: 800;
      letter-spacing: 0.5px;
    }
    .project-desc {
      fill: #e1daf2;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }
    .project-highlight {
      fill: #c5bcdb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.1px;
      dominant-baseline: middle;
    }
    @keyframes float-p {
      from { transform: translateY(0px); opacity: 0.3; }
      to   { transform: translateY(-6px); opacity: 0.75; }
    }
